name = "micaiahs-worker"
main = "src/index.js"
compatibility_date = "2024-01-01"

[vars]
ENVIRONMENT = "production"

# Service binding to The Board worker
[[services]]
binding = "BOARD"
service = "the-board"

# KV namespace for Outer Rim workspace data (Siri / phone automation)
[[kv_namespaces]]
binding = "OUTER_RIM_KV"
id = "9a94c91aa6fb414c86ce246917431c26"

# KV namespace for Electron-app cloud sync (GitHub OAuth, versioned state per user)
[[kv_namespaces]]
binding = "SYNC_KV"
id = "adbc2e12db4e49be91c21dcffaf93fc8"

# Secrets required for sync (set with `wrangler secret put`):
#   GITHUB_CLIENT_ID
#   GITHUB_CLIENT_SECRET
#   TOKEN_SIGNING_KEY   (random long string, any format)
